name: lint

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        # Scans every *.sh in the repo (sync.sh, entrypoint.sh) by default.

  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          # DL3018: alpine apk packages are intentionally unpinned (rolling
          # patches via --no-cache). DL3007/DL4006 not triggered here.
          ignore: DL3018
